name: Publish to npm

# Publishes to npm via OIDC Trusted Publishing — no NPM_TOKEN needed.
# One-time setup on npmjs.com: package Settings -> Trusted Publisher ->
# add GitHub Actions publisher (owner=oratis, repo=purequant-js, workflow=publish.yml).
# Then push a tag like v0.1.0 (or publish a GitHub Release) to publish.

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      - run: npm test
      # npm >= 11.5 publishes via OIDC when id-token: write is set; --provenance
      # attaches a signed build provenance statement.
      - run: npm publish --provenance --access public
